model:
  default: deepseek-v4-pro
  provider: deepseek
  base_url: https://api.deepseek.com/v1
  api_key: <in NAS backup>
agent:
  max_turns: 150
  verbose: false
  reasoning_effort: medium
  personalities:
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
    technical: You are a technical expert. Provide detailed, accurate technical information.
terminal:
  backend: local
  cwd: .
  timeout: 180
  home_mode: auto
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
  docker_mount_cwd_to_workspace: false
  lifetime_seconds: 300
web:
  backend: ddgs
  use_gateway: false
browser:
  inactivity_timeout: 120
  cloud_provider: local
  use_gateway: false
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  protect_first_n: 3
  codex_gpt55_autoraise: true
  codex_app_server_auto: native
prompt_caching:
  cache_ttl: 5m
auxiliary:
  vision:
    provider: openai-api
    model: gpt-4o
display:
  compact: false
  busy_input_mode: interrupt
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  skin: default
  interim_assistant_messages: true
  tool_progress: all
  cleanup_progress: false
  long_running_notifications: true
  busy_ack_detail: true
  background_process_notifications: all
tts:
  use_gateway: false
  provider: piper
  voice: en-US-AvaNeural
  edge:
    voice: en-US-AvaNeural
  piper:
    voice: en_US-libritts_r-medium
stt:
  enabled: true
  local:
    model: base
  openai:
    model: whisper-1
  provider: local
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  provider: honcho
  nudge_interval: 10
  flush_min_turns: 6
  honcho:
    dialecticCadence: 5
delegation:
  max_iterations: 50
skills:
  creation_nudge_interval: 15
  disabled:
    - airtable
    - arxiv
    - ascii-video
    - audiocraft-audio-generation
    - baoyu-infographic
    - claude-design
    - comfyui
    - design-md
    - evaluating-llms-harness
    - gif-search
    - google-workspace
    - himalaya
    - huggingface-hub
    - jupyter-live-kernel
    - llama-cpp
    - llm-wiki
    - manim-video
    - nano-pdf
    - notion
    - openhue
    - p5js
    - petdex
    - powerpoint
    - pretext
    - research-paper-writing
    - segment-anything-model
    - serving-llms-vllm
    - teams-meeting-pipeline
    - touchdesigner-mcp
    - weights-and-biases
approvals:
  mode: false
  destructive_slash_confirm: false
command_allowlist:
  - script execution via -e/-c flag
  - force kill processes
code_execution:
  timeout: 300
  max_tool_calls: 50
streaming:
  enabled: true
onboarding:
  seen:
    openclaw_residue_cleanup: true
    busy_input_prompt: true
    tool_progress_prompt: true
updates:
  pre_update_backup: false
  backup_keep: 5
  non_interactive_local_changes: stash
_config_version: 33
session_reset:
  mode: none
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - computer_use
    - context_engine
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - session_search
    - skills
    - terminal
    - todo
    - tts
    - vision
    - web
  discord:
    - browser
    - clarify
    - code_execution
    - computer_use
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - session_search
    - skills
    - terminal
    - todo
    - tts
    - vision
    - web
image_gen:
  provider: openai
  use_gateway: false
  model: gpt-image-2-medium
known_plugin_toolsets:
  cli:
    - spotify
  discord:
    - spotify
plugins:
  enabled:
    - disk-cleanup
    - hermes-achievements
  disabled: []
platforms:
  api_server:
    enabled: true
    extra:
      port: 8642
      host: 127.0.0.1
voice:
  auto_tts: true
